<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Raven Labs Marketing Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #f1f5f9;
            background-image:
                radial-gradient(circle at 15% 50%, rgba(0, 86, 210, 0.05), transparent 35%),
                radial-gradient(circle at 85% 30%, rgba(15, 23, 42, 0.03), transparent 35%);
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 24px;
            padding: 3rem;
            width: 100%;
            max-width: 420px;
            text-align: center;
            box-shadow:
                5px 5px 15px rgba(0, 0, 0, 0.05),
                -5px -5px 15px rgba(255, 255, 255, 0.8),
                inset 1px 1px 0px rgba(255, 255, 255, 0.5);
        }

        .login-card::after {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 40%;
            background: linear-gradient(to bottom, rgba(255,255,255,0.4), transparent);
            pointer-events: none;
            border-radius: 24px 24px 0 0;
        }

        .login-card { position: relative; overflow: hidden; }

        .login-logo {
            max-width: 180px;
            height: auto;
            margin-bottom: 1.5rem;
        }

        .login-title {
            font-size: 1.5rem;
            font-weight: 600;
            color: #0f172a;
            margin-bottom: 0.5rem;
        }

        .login-subtitle {
            color: #475569;
            font-size: 0.95rem;
            margin-bottom: 2rem;
        }

        .google-btn {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            background: #ffffff;
            border: 1px solid rgba(0, 0, 0, 0.08);
            border-radius: 14px;
            padding: 14px 28px;
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            font-weight: 500;
            color: #0f172a;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow:
                5px 5px 15px rgba(0, 0, 0, 0.05),
                -5px -5px 15px rgba(255, 255, 255, 0.8),
                inset 1px 1px 0px rgba(255, 255, 255, 0.5);
            position: relative;
            z-index: 2;
        }

        .google-btn:hover {
            transform: translateY(-2px);
            box-shadow:
                8px 15px 25px rgba(0, 0, 0, 0.08),
                -5px -5px 15px rgba(255, 255, 255, 0.9),
                inset 1px 1px 0px rgba(255, 255, 255, 0.6);
        }

        .google-btn:active {
            transform: translateY(0);
            box-shadow:
                inset 5px 5px 10px rgba(0, 0, 0, 0.05),
                inset -5px -5px 10px rgba(255, 255, 255, 0.8);
        }

        .google-icon {
            width: 24px;
            height: 24px;
        }

        .error-message {
            background: #fef2f2;
            color: #dc2626;
            border: 1px solid #fecaca;
            border-radius: 10px;
            padding: 12px 16px;
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
            font-weight: 500;
            display: none;
        }

        .login-footer {
            margin-top: 2rem;
            font-size: 0.8rem;
            color: #94a3b8;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <img src="https://ravenlabs.com.au/wp-content/uploads/2024/02/Logo-Theme-colors.png" alt="Raven Labs Logo" class="login-logo">
        <h1 class="login-title">Marketing Dashboard</h1>
        <p class="login-subtitle">Sign in with your Google account to access analytics</p>
        <div class="error-message" id="error-msg">Access denied. Your Google account is not authorized to view this dashboard.</div>
        <a href="/oauth/start" class="google-btn">
            <svg class="google-icon" viewBox="0 0 24 24">
                <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/>
                <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
            </svg>
            Sign in with Google
        </a>
        <p class="login-footer">Authorized users only. Access is logged.</p>
    </div>
    <script>
        if (window.location.search.includes('error=access_denied')) {
            document.getElementById('error-msg').style.display = 'block';
        }
    </script>
</body>
</html>
